{% load static %}
{% load i18n %}
{% load compress %}
{% load vite_tags %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{{ SITE_NAME }} | {% block page_title %}Account{% endblock %}</title>
    <link rel="icon" href="/favicon.ico">

    <!-- 新前端：Tailwind CSS + Alpine.js + HTMX（通过Vite构建） -->
    {% vite_js 'src/main.js' %}

    <!-- 插件CSS文件 -->
    {% compress css %}
        {% block compress_css %}{% endblock %}
    {% endcompress %}

    <style>
        .account-bg {
            background-image:
                radial-gradient(at 20% 20%, rgb(var(--color-primary-500) / 0.08) 0%, transparent 50%),
                radial-gradient(at 80% 80%, rgb(var(--color-primary-400) / 0.05) 0%, transparent 50%);
        }
    </style>
</head>

<body class="account-bg min-h-screen flex items-center justify-center p-4 bg-background" x-data="{ showPassword: false }">
    {% block content %}{% endblock %}
</body>
</html>
