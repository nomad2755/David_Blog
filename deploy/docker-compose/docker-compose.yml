services:
  db:
    image: mysql:latest
    restart: always
    environment:
      - MYSQL_DATABASE=djangoblog
      - MYSQL_ROOT_PASSWORD=RootPass123
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/01-remote-user.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pRootPass123"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    container_name: db

  djangoblog:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    command: bash -c 'sh /code/djangoblog/deploy/entrypoint.sh'
    ports:
      - "8000:8000"
    volumes:
      - static_files:/code/djangoblog/collectedstatic
      - ./logs:/code/djangoblog/logs
      - ./uploads:/code/djangoblog/uploads
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_MYSQL_DATABASE=djangoblog
      - DJANGO_MYSQL_USER=root
      - DJANGO_MYSQL_PASSWORD=RootPass123
      - DJANGO_MYSQL_HOST=db
      - DJANGO_MYSQL_PORT=3306
      - DJANGO_REDIS_URL=redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    container_name: djangoblog
  nginx:
    restart: always
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf
      - static_files:/code/djangoblog/collectedstatic:ro
    depends_on:
      djangoblog:
        condition: service_started
    container_name: nginx

  redis:
    restart: always
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  static_files:
